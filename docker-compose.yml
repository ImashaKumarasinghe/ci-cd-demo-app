services:
  backend:
    build: ./backend
    container_name: cicd-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: cicd-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend